name: Daily Destatis ML Sync

on:
  schedule:
    - cron: "0 6 * * *" # 06:00 UTC = 08:00 Europe/Berlin (Sommerzeit)
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily sync
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO_ID: ${{ secrets.HF_REPO_ID }}
        run: |
          python scripts/daily_destatis_sync.py

      - name: Commit & push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data metadata scripts .github/workflows requirements.txt || true
          git diff --cached --quiet || git commit -m "chore: daily destatis ml sync"
          git push
